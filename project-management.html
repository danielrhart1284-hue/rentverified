<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Management &ndash; 3120 Life</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: #f3f4f6; }
    .pm-layout { max-width: 1200px; margin: 0 auto; padding: 5.5rem 1.5rem 2rem; }
    .pm-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .pm-header h1 { font-size: 1.75rem; font-weight: 900; color: #121212; }
    .pm-header .sub { font-size: 0.85rem; color: #6b7280; }

    /* Project Cards Grid */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .project-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 1.25rem; cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s; }
    .project-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); border-color: #00E676; }
    .project-card.active-card { border-color: #00E676; box-shadow: 0 4px 12px rgba(0,230,118,.2); }
    .project-card h4 { font-size: 1rem; font-weight: 800; color: #121212; margin-bottom: 0.35rem; }
    .project-card .client { font-size: 0.82rem; color: #6b7280; margin-bottom: 0.5rem; }
    .project-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; font-size: 0.78rem; }
    .project-meta .due { color: #6b7280; }
    .progress-bar { height: 6px; background: #e5e7eb; border-radius: 999px; margin-top: 0.5rem; overflow: hidden; }
    .progress-bar .fill { height: 100%; border-radius: 999px; background: #00E676; transition: width 0.3s; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
    .badge.planning { background: rgba(0,230,118,0.12); color: #065f46; }
    .badge.active { background: rgba(0,230,118,0.12); color: #047857; }
    .badge.on-hold { background: #fef3c7; color: #92400e; }
    .badge.completed { background: #d1fae5; color: #065f46; }

    .priority-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.68rem; font-weight: 700; }
    .priority-badge.high { background: #fee2e2; color: #991b1b; }
    .priority-badge.medium { background: #fef3c7; color: #92400e; }
    .priority-badge.low { background: #d1fae5; color: #065f46; }

    /* Task Board */
    .task-board { display: none; margin-bottom: 1.5rem; }
    .task-board.visible { display: block; }
    .task-board-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
    .task-board-header h2 { font-size: 1.3rem; font-weight: 800; color: #121212; }
    .back-btn { background: #f3f4f6; color: #374151; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; font-size: 0.85rem; cursor: pointer; }

    .columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .column { background: #f9fafb; border-radius: 12px; padding: 1rem; min-height: 200px; }
    .column h5 { font-size: 0.82rem; font-weight: 800; text-transform: uppercase; color: #6b7280; margin-bottom: 0.75rem; letter-spacing: 0.05em; }
    .column.todo h5 { color: #6b7280; }
    .column.progress h5 { color: #00C853; }
    .column.done h5 { color: #059669; }

    .task-card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 0.85rem; margin-bottom: 0.5rem; }
    .task-card .task-name { font-weight: 700; font-size: 0.88rem; color: #121212; margin-bottom: 0.35rem; }
    .task-card .task-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #6b7280; }
    .task-card select { padding: 2px 4px; font-size: 0.72rem; border: 1px solid #d1d5db; border-radius: 6px; }
    .task-del { padding: 2px 6px; font-size: 0.68rem; font-weight: 600; border-radius: 4px; cursor: pointer; border: none; background: #fee2e2; color: #dc2626; }

    .btn-add { background: #00E676; color: #121212; border: none; padding: 0.6rem 1.25rem; border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
    .btn-add:hover { background: #00C853; }
    .btn-sm-add { background: #00E676; color: #121212; border: none; padding: 0.4rem 0.85rem; border-radius: 8px; font-weight: 700; font-size: 0.82rem; cursor: pointer; }

    .act-btn { padding: 3px 8px; font-size: 0.72rem; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; margin-right: 3px; }
    .act-btn.del { background: #fee2e2; color: #dc2626; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 2rem; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.2rem; font-weight: 800; color: #121212; margin-bottom: 1rem; }
    .modal label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 4px; margin-top: 0.75rem; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.88rem; box-sizing: border-box; }
    .modal textarea { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .modal-actions .btn-save { flex: 1; background: #00E676; color: #121212; border: none; padding: 0.6rem; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .modal-actions .btn-cancel { flex: 1; background: #f3f4f6; color: #374151; border: none; padding: 0.6rem; border-radius: 10px; font-weight: 700; cursor: pointer; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1e293b; color: #fff; padding: 0.75rem 1.5rem; border-radius: 10px; font-size: 0.88rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 2000; pointer-events: none; }
    .toast.show { opacity: 1; }
    .empty-state { text-align: center; padding: 3rem; color: #9ca3af; }

    @media (max-width: 768px) {
      .pm-layout { padding: 5rem 0.75rem 1.5rem; }
      .projects-grid { grid-template-columns: 1fr; }
      .columns { grid-template-columns: 1fr; }
      .row2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="9" fill="#00E676"/><path d="M18 8L8 14v14h6v-8h8v8h6V14L18 8z" fill="white"/><circle cx="22" cy="12" r="3" fill="#93c5fd"/></svg>
    <span style="font-weight:800;">3120 Life</span> <span style="font-weight:500;opacity:0.9;">Projects</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="crm.html">CRM</a>
    <a href="project-management.html" style="color:#00E676;font-weight:700;">Projects</a>
    <a href="time-tracking.html">Time Tracking</a>
  </div>
  <div class="nav-cta"><a href="index.html" class="btn btn-primary btn-sm">Dashboard</a></div>
</nav>

<div class="pm-layout">
  <div class="pm-header">
    <div>
      <h1>Project Management</h1>
      <span class="sub">Manage projects and tasks</span>
    </div>
    <button class="btn-add" onclick="openProjectModal()">+ New Project</button>
  </div>

  <!-- Project Grid -->
  <div id="projectsView">
    <div class="projects-grid" id="projectsGrid"></div>
    <div class="empty-state" id="emptyProjects">No projects yet. Click "+ New Project" to start.</div>
  </div>

  <!-- Task Board (hidden by default) -->
  <div class="task-board" id="taskBoard">
    <div class="task-board-header">
      <div>
        <button class="back-btn" onclick="closeTaskBoard()">&larr; All Projects</button>
        <h2 id="taskBoardTitle" style="display:inline-block;margin-left:0.75rem;vertical-align:middle;">Project Tasks</h2>
      </div>
      <button class="btn-sm-add" onclick="openTaskModal()">+ Add Task</button>
    </div>
    <div class="columns">
      <div class="column todo">
        <h5>To Do</h5>
        <div id="colTodo"></div>
      </div>
      <div class="column progress">
        <h5>In Progress</h5>
        <div id="colProgress"></div>
      </div>
      <div class="column done">
        <h5>Done</h5>
        <div id="colDone"></div>
      </div>
    </div>
  </div>
</div>

<!-- Project Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h2>New Project</h2>
    <label>Project Name</label>
    <input type="text" id="pName" placeholder="e.g. Kitchen Renovation" />
    <label>Client</label>
    <input type="text" id="pClient" placeholder="e.g. Smith Family" />
    <div class="row2">
      <div>
        <label>Status</label>
        <select id="pStatus">
          <option value="planning">Planning</option>
          <option value="active">Active</option>
          <option value="on-hold">On Hold</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div>
        <label>Due Date</label>
        <input type="date" id="pDue" />
      </div>
    </div>
    <label>Description</label>
    <textarea id="pDesc" placeholder="Project details..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProjectModal()">Cancel</button>
      <button class="btn-save" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2>Add Task</h2>
    <label>Task Name</label>
    <input type="text" id="tName" placeholder="e.g. Order cabinets" />
    <div class="row2">
      <div>
        <label>Assigned To</label>
        <input type="text" id="tAssigned" placeholder="e.g. John" />
      </div>
      <div>
        <label>Due Date</label>
        <input type="date" id="tDue" />
      </div>
    </div>
    <div class="row2">
      <div>
        <label>Priority</label>
        <select id="tPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div>
        <label>Status</label>
        <select id="tStatus">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="supabase-config.js"></script>
<script src="data-layer.js"></script>
<script>RVData._useSupabase = function() { return false; };</script>
<script src="share-widget.js"></script>
<script>
var PROJ_KEY = 'rv_projects_pm';
var TASK_KEY = 'rv_project_tasks';
var activeProjectId = null;

function uid() { return typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : 'pm_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); }

function getProjects() { try { return JSON.parse(localStorage.getItem(PROJ_KEY)) || []; } catch(e) { console.error('Failed to parse projects:', e); return []; } }
function saveProjects(d) { localStorage.setItem(PROJ_KEY, JSON.stringify(d)); }
function getTasks() { try { return JSON.parse(localStorage.getItem(TASK_KEY)) || []; } catch(e) { console.error('Failed to parse tasks:', e); return []; } }
function saveTasks(d) { localStorage.setItem(TASK_KEY, JSON.stringify(d)); }

function calcProgress(projectId) {
  var tasks = getTasks().filter(function(t) { return t.projectId === projectId; });
  if (!tasks.length) return 0;
  var done = tasks.filter(function(t) { return t.status === 'done'; }).length;
  return Math.round(done / tasks.length * 100);
}

function renderProjects() {
  var list = getProjects();
  document.getElementById('emptyProjects').style.display = list.length ? 'none' : 'block';
  document.getElementById('projectsGrid').innerHTML = list.map(function(p, i) {
    var progress = calcProgress(p.id);
    var taskCount = getTasks().filter(function(t) { return t.projectId === p.id; }).length;
    return '<div class="project-card" onclick="openTaskBoard(\''+p.id+'\')">' +
      '<div style="display:flex;justify-content:space-between;align-items:start;">' +
        '<h4>' + esc(p.name) + '</h4>' +
        '<button class="act-btn del" onclick="event.stopPropagation();deleteProject('+i+')" title="Delete">Del</button>' +
      '</div>' +
      '<div class="client">' + esc(p.client || 'No client') + '</div>' +
      '<span class="badge ' + p.status + '">' + formatStatus(p.status) + '</span>' +
      '<div class="project-meta">' +
        '<span class="due">' + (p.dueDate ? 'Due: ' + p.dueDate : 'No due date') + '</span>' +
        '<span>' + taskCount + ' task' + (taskCount!==1?'s':'') + '</span>' +
      '</div>' +
      '<div class="progress-bar"><div class="fill" style="width:'+progress+'%"></div></div>' +
      '<div style="font-size:0.75rem;color:#6b7280;margin-top:4px;text-align:right;">'+progress+'%</div>' +
    '</div>';
  }).join('');
}

function formatStatus(s) {
  return (s||'').replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
}

function deleteProject(i) {
  if (!confirm('Delete this project and all its tasks?')) return;
  var list = getProjects();
  var pid = list[i].id;
  list.splice(i,1);
  saveProjects(list);
  // Remove tasks for this project
  var tasks = getTasks().filter(function(t) { return t.projectId !== pid; });
  saveTasks(tasks);
  renderProjects();
  toast('Project deleted');
}

function openProjectModal() {
  document.getElementById('pName').value = '';
  document.getElementById('pClient').value = '';
  document.getElementById('pStatus').value = 'planning';
  document.getElementById('pDue').value = '';
  document.getElementById('pDesc').value = '';
  document.getElementById('projectModal').classList.add('show');
}
function closeProjectModal() { document.getElementById('projectModal').classList.remove('show'); }

function saveProject() {
  var name = document.getElementById('pName').value.trim();
  if (!name) { toast('Enter project name'); return; }
  var dueDate = document.getElementById('pDue').value;
  if (dueDate && dueDate < new Date().toISOString().slice(0,10)) { toast('Due date is in the past'); return; }
  var list = getProjects();
  var dup = list.some(function(p) { return p.name.toLowerCase() === name.toLowerCase(); });
  if (dup) { toast('A project with that name already exists'); return; }
  list.push({
    id: uid(),
    name: name,
    client: document.getElementById('pClient').value.trim(),
    status: document.getElementById('pStatus').value,
    dueDate: dueDate,
    description: document.getElementById('pDesc').value.trim()
  });
  saveProjects(list);
  closeProjectModal(); renderProjects();
  toast('Project created');
}

// Task Board
function openTaskBoard(projectId) {
  activeProjectId = projectId;
  var proj = getProjects().find(function(p) { return p.id === projectId; });
  if (!proj) return;
  document.getElementById('taskBoardTitle').textContent = proj.name;
  document.getElementById('projectsView').style.display = 'none';
  document.getElementById('taskBoard').classList.add('visible');
  renderTasks();
}

function closeTaskBoard() {
  activeProjectId = null;
  document.getElementById('taskBoard').classList.remove('visible');
  document.getElementById('projectsView').style.display = 'block';
  renderProjects();
}

function renderTasks() {
  if (!activeProjectId) return;
  var tasks = getTasks().filter(function(t) { return t.projectId === activeProjectId; });
  var todo = tasks.filter(function(t) { return t.status === 'todo'; });
  var inProg = tasks.filter(function(t) { return t.status === 'in_progress'; });
  var done = tasks.filter(function(t) { return t.status === 'done'; });

  document.getElementById('colTodo').innerHTML = renderTaskCards(todo);
  document.getElementById('colProgress').innerHTML = renderTaskCards(inProg);
  document.getElementById('colDone').innerHTML = renderTaskCards(done);
}

function renderTaskCards(tasks) {
  if (!tasks.length) return '<div style="color:#9ca3af;font-size:0.82rem;padding:0.5rem;">No tasks</div>';
  return tasks.map(function(t) {
    return '<div class="task-card">' +
      '<div class="task-name">' + esc(t.name) + '</div>' +
      '<div class="task-meta">' +
        '<span>' + (t.assigned ? esc(t.assigned) : '') + '</span>' +
        '<span class="priority-badge ' + t.priority + '">' + (t.priority||'medium') + '</span>' +
      '</div>' +
      '<div class="task-meta" style="margin-top:0.35rem;">' +
        '<span>' + (t.dueDate || '') + '</span>' +
        '<div>' +
          '<select onchange="changeTaskStatus(\''+t.id+'\',this.value)" style="margin-right:4px;">' +
            '<option value="todo"'+(t.status==='todo'?' selected':'')+'>To Do</option>' +
            '<option value="in_progress"'+(t.status==='in_progress'?' selected':'')+'>In Progress</option>' +
            '<option value="done"'+(t.status==='done'?' selected':'')+'>Done</option>' +
          '</select>' +
          '<button class="task-del" onclick="deleteTask(\''+t.id+'\')">X</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function changeTaskStatus(taskId, newStatus) {
  var tasks = getTasks();
  var task = tasks.find(function(t) { return t.id === taskId; });
  if (task) { task.status = newStatus; saveTasks(tasks); renderTasks(); }
}

function deleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  var tasks = getTasks().filter(function(t) { return t.id !== taskId; });
  saveTasks(tasks); renderTasks(); toast('Task deleted');
}

function openTaskModal() {
  document.getElementById('tName').value = '';
  document.getElementById('tAssigned').value = '';
  document.getElementById('tDue').value = '';
  document.getElementById('tPriority').value = 'medium';
  document.getElementById('tStatus').value = 'todo';
  document.getElementById('taskModal').classList.add('show');
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('show'); }

function saveTask() {
  var name = document.getElementById('tName').value.trim();
  if (!name) { toast('Enter task name'); return; }
  var dueDate = document.getElementById('tDue').value;
  if (dueDate && dueDate < new Date().toISOString().slice(0,10)) { toast('Task due date is in the past'); return; }
  var tasks = getTasks();
  tasks.push({
    id: uid(),
    projectId: activeProjectId,
    name: name,
    assigned: document.getElementById('tAssigned').value.trim(),
    dueDate: dueDate,
    priority: document.getElementById('tPriority').value,
    status: document.getElementById('tStatus').value
  });
  saveTasks(tasks);
  closeTaskModal(); renderTasks();
  toast('Task added');
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function toast(msg) { var el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); }, 3500); }

document.addEventListener('DOMContentLoaded', function() { renderProjects(); });
</script>
</body>
</html>
