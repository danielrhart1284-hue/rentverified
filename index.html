<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3120 Life — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Lexend', -apple-system, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      line-height: 1.8;
    }
    .logo {
      width: 64px; height: 64px; background: #00E676; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2rem;
    }
    .logo svg { width: 36px; height: 36px; }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .accent { color: #00E676; }
    p { color: #94a3b8; font-size: 1.1rem; max-width: 480px; margin-bottom: 2rem; }
    .badge {
      display: inline-block; padding: 0.4rem 1.2rem; border-radius: 99px;
      background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.3);
      color: #00E676; font-size: 0.85rem; font-weight: 600; margin-bottom: 2rem;
    }
    .notify-form {
      display: flex; gap: 0.5rem; max-width: 420px; width: 100%;
    }
    .notify-form input {
      flex: 1; padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid #334155;
      background: #1e293b; color: white; font-size: 0.95rem; font-family: inherit;
    }
    .notify-form input::placeholder { color: #64748b; }
    .notify-form input:focus { outline: none; border-color: #00E676; }
    .notify-form button {
      padding: 0.75rem 1.5rem; border-radius: 10px; border: none;
      background: #00E676; color: #0f172a; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .notify-form button:hover { background: #00c853; }
    .footer { margin-top: 3rem; color: #475569; font-size: 0.8rem; }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #00E676; color: #0f172a; padding: 0.75rem 1.5rem; border-radius: 10px;
      font-weight: 700; opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .notify-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none"><path d="M18 8L8 14v14h6v-8h8v8h6V14L18 8z" fill="white"/><circle cx="22" cy="12" r="3" fill="#93c5fd"/></svg>
  </div>
  <div class="badge">Early Access — Coming Soon</div>
  <h1>Run your business<br><span class="accent">smarter.</span></h1>
  <p>3120 Life is a business operations platform built in Utah. Join the waitlist for the first all-in-one Business OS built in Utah.</p>

  <form class="notify-form" onsubmit="return handleNotify(event)">
    <input type="email" id="notifyEmail" placeholder="Enter your email" required />
    <button type="submit">Notify Me</button>
  </form>

  <div class="footer">3120Life LLC &middot; Herriman, UT &middot; 3120life.com</div>
  <a href="admin.html" style="color:#334155;font-size:0.7rem;text-decoration:none;margin-top:1.5rem;display:inline-block;opacity:0.5;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">Admin</a>

  <div class="toast" id="toast"></div>

  <script>
    function handleNotify(e) {
      e.preventDefault();
      var email = document.getElementById('notifyEmail').value.trim().toLowerCase();
      var list = [];
      try { list = JSON.parse(localStorage.getItem('rv_notify_list') || '[]'); } catch(err) { list = []; }
      if (list.some(function(item) { return item.email === email; })) {
        var t = document.getElementById('toast');
        t.textContent = "You're already on the list!";
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 4000);
        document.getElementById('notifyEmail').value = '';
        return false;
      }
      list.push({ email: email, date: new Date().toISOString() });
      localStorage.setItem('rv_notify_list', JSON.stringify(list));

      var t = document.getElementById('toast');
      t.textContent = "You're on the list! We'll email you when we launch.";
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 4000);

      document.getElementById('notifyEmail').value = '';
      return false;
    }
  </script>
</body>
</html>
