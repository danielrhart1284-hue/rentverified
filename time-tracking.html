<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracking – 3120 Life</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .tt-layout { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .tt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .tt-header h1 { font-size: 1.75rem; font-weight: 900; color: #121212; }

    .timer-card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 2rem; text-align: center; margin-bottom: 1.5rem; }
    .timer-display { font-size: 3.5rem; font-weight: 900; color: #121212; font-variant-numeric: tabular-nums; margin: 1rem 0; }
    .timer-controls { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 1rem; }
    .btn-timer { padding: 0.65rem 2rem; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
    .btn-timer.start { background: #00E676; color: #121212; }
    .btn-timer.start:hover { background: #00C853; }
    .btn-timer.stop { background: #dc2626; color: white; }
    .btn-timer.stop:hover { background: #b91c1c; }
    .btn-timer.pause { background: #d97706; color: white; }
    .btn-timer.pause:hover { background: #b45309; }
    .btn-timer.reset { background: #f3f4f6; color: #374151; }

    .timer-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .timer-meta label { display: block; font-size: 0.78rem; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    .timer-meta input, .timer-meta select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.85rem; box-sizing: border-box; }

    .tt-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .tt-stat { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 1rem; text-align: center; }
    .tt-stat .val { font-size: 1.4rem; font-weight: 900; color: #00E676; }
    .tt-stat .lbl { font-size: 0.72rem; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-top: 4px; }

    .tt-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 1.5rem; }
    .tt-card h3 { padding: 1rem 1.25rem 0; font-size: 1rem; font-weight: 800; color: #121212; }
    .tt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .tt-table th { text-align: left; padding: 0.65rem 1rem; font-weight: 700; font-size: 0.72rem; text-transform: uppercase; color: #6b7280; background: #f9fafb; border-bottom: 2px solid #e5e7eb; }
    .tt-table td { padding: 0.65rem 1rem; border-bottom: 1px solid #f3f4f6; }
    .tt-table tr:hover td { background: #f9fafb; }
    .act-btn { padding: 3px 8px; font-size: 0.72rem; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; margin-right: 3px; }
    .act-btn.del { background: #fee2e2; color: #dc2626; }
    .act-btn.inv { background: rgba(0,230,118,0.12); color: #00C853; }

    .manual-entry { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 1.25rem; margin-bottom: 1.5rem; }
    .manual-entry h3 { font-size: 1rem; font-weight: 800; color: #121212; margin-bottom: 1rem; }
    .me-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 0.75rem; align-items: end; }
    .me-row label { font-size: 0.78rem; font-weight: 600; color: #6b7280; }
    .me-row input, .me-row select { padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.82rem; }

    @media (max-width: 640px) {
      .timer-meta { grid-template-columns: 1fr; }
      .me-row { grid-template-columns: 1fr 1fr; }
      .timer-display { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

    <a href="crm.html">CRM</a>
    <a href="invoice-builder.html">Invoices</a>
    <a href="time-tracking.html" style="color:#00E676;font-weight:700;">Time</a>
  </div>
  <div class="nav-cta">
    <a href="landlord-signup.html" class="btn btn-primary btn-sm">Dashboard</a>
  </div>
</nav>

<div class="tt-layout">
  <div class="tt-header">
    <h1>Time Tracking</h1>
    <span style="font-size:0.85rem;color:#6b7280;">For attorneys, CPAs, consultants, and service providers</span>
  </div>

  <!-- Live Timer -->
  <div class="timer-card">
    <div style="font-size:0.85rem;font-weight:600;color:#6b7280;">Current Timer</div>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-controls">
      <button class="btn-timer start" id="btnStart" onclick="startTimer()">Start</button>
      <button class="btn-timer pause" id="btnPause" onclick="pauseTimer()" style="display:none;">Pause</button>
      <button class="btn-timer stop" id="btnStop" onclick="stopTimer()" style="display:none;">Stop & Save</button>
      <button class="btn-timer reset" onclick="resetTimer()">Reset</button>
    </div>
    <div class="timer-meta">
      <div><label>Client / Matter</label><input type="text" id="timerClient" placeholder="e.g. Smith v. Jones" /></div>
      <div><label>Category</label>
        <select id="timerCategory">
          <option>Legal Research</option>
          <option>Client Meeting</option>
          <option>Court Appearance</option>
          <option>Document Review</option>
          <option>Tax Preparation</option>
          <option>Audit</option>
          <option>Consultation</option>
          <option>Property Inspection</option>
          <option>Admin / Other</option>
        </select>
      </div>
      <div><label>Hourly Rate ($)</label><input type="number" id="timerRate" value="250" step="25" /></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="tt-stats" id="ttStats"></div>

  <!-- Manual Entry -->
  <div class="manual-entry">
    <h3>Quick Manual Entry</h3>
    <div class="me-row">
      <div><label>Description</label><input type="text" id="meDesc" placeholder="What did you work on?" /></div>
      <div><label>Hours</label><input type="number" id="meHours" value="1" step="0.25" min="0.25" /></div>
      <div><label>Rate ($/hr)</label><input type="number" id="meRate" value="250" step="25" /></div>
      <div><label>Date</label><input type="date" id="meDate" /></div>
      <div style="padding-bottom:1px;"><button class="btn-timer start" style="padding:0.5rem 1rem;font-size:0.82rem;" onclick="addManualEntry()">Add</button></div>
    </div>
  </div>

  <!-- Time Entries -->
  <div class="tt-card">
    <h3 style="display:flex;align-items:center;justify-content:space-between;">
      <span>Time Entries</span>
      <button class="btn-timer reset" style="padding:0.35rem 1rem;font-size:0.78rem;" onclick="exportTimeEntries()">Export CSV</button>
    </h3>
    <div style="overflow-x:auto;">
      <table class="tt-table">
        <thead><tr><th>Date</th><th>Client / Matter</th><th>Category</th><th>Duration</th><th>Rate</th><th>Amount</th><th>Actions</th></tr></thead>
        <tbody id="timeBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="data-layer.js"></script>
<script>
const TT_KEY = 'rv_time_entries';
var timerInterval = null;
var timerSeconds = 0;
var timerRunning = false;

/** Sanitize text for safe HTML insertion — prevents XSS */
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/** Generate unique ID for each entry */
function uid() {
  return 'tt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
}

function getEntries() {
  try {
    var raw = localStorage.getItem(TT_KEY);
    var entries = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(entries)) entries = [];
    if (!entries.length) {
      entries = [
        { id: uid(), date: '2025-03-18', client: 'Smith v. Jones', category: 'Legal Research', hours: 2.5, rate: 300, amount: 750 },
        { id: uid(), date: '2025-03-17', client: 'Harris Estate Planning', category: 'Document Review', hours: 1.75, rate: 300, amount: 525 },
        { id: uid(), date: '2025-03-17', client: 'Acme Corp Tax Filing', category: 'Tax Preparation', hours: 3, rate: 250, amount: 750 },
        { id: uid(), date: '2025-03-16', client: '3120Life LLC - Lease Review', category: 'Client Meeting', hours: 1, rate: 300, amount: 300 },
        { id: uid(), date: '2025-03-15', client: 'Johnson Property Inspection', category: 'Property Inspection', hours: 0.5, rate: 150, amount: 75 },
      ];
      localStorage.setItem(TT_KEY, JSON.stringify(entries));
    }
    return entries;
  } catch (e) {
    console.error('Failed to parse time entries:', e);
    return [];
  }
}

function renderStats() {
  var entries = getEntries();
  var now = new Date();
  var weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  var totalHours = 0, weekHours = 0, monthHours = 0, totalBilled = 0;
  entries.forEach(function(e) {
    totalHours += e.hours || 0;
    totalBilled += e.amount || 0;
    var d = new Date(e.date);
    if (d >= weekStart) weekHours += e.hours || 0;
    if (d >= monthStart) monthHours += e.hours || 0;
  });

  document.getElementById('ttStats').innerHTML = [
    { val: esc(totalHours.toFixed(1) + 'h'), lbl: 'Total Hours' },
    { val: esc(weekHours.toFixed(1) + 'h'), lbl: 'This Week' },
    { val: esc(monthHours.toFixed(1) + 'h'), lbl: 'This Month' },
    { val: '$' + esc(totalBilled.toLocaleString()), lbl: 'Total Billed' },
    { val: esc(String(entries.length)), lbl: 'Entries' },
  ].map(function(s) {
    return '<div class="tt-stat"><div class="val">' + s.val + '</div><div class="lbl">' + s.lbl + '</div></div>';
  }).join('');
}

function renderEntries() {
  var entries = getEntries();
  var body = document.getElementById('timeBody');
  if (!entries.length) {
    body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:2rem;">No time entries yet</td></tr>';
    return;
  }
  body.innerHTML = entries.map(function(e, i) {
    return '<tr>' +
      '<td>' + esc(e.date || '') + '</td>' +
      '<td><strong>' + esc(e.client || '') + '</strong></td>' +
      '<td>' + esc(e.category || '') + '</td>' +
      '<td>' + esc(String(e.hours || 0)) + 'h</td>' +
      '<td>$' + esc(String(e.rate || 0)) + '/hr</td>' +
      '<td><strong>$' + esc((e.amount || 0).toLocaleString()) + '</strong></td>' +
      '<td><button class="act-btn inv" onclick="createInvoiceFromEntry(' + i + ')">Invoice</button><button class="act-btn del" onclick="deleteEntry(' + i + ')">Del</button></td>' +
    '</tr>';
  }).join('');
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = '';
  document.getElementById('btnStop').style.display = '';
  timerInterval = setInterval(function() {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStart').textContent = 'Resume';
  document.getElementById('btnPause').style.display = 'none';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  var hours = Math.round((timerSeconds / 3600) * 4) / 4; // Round to nearest 0.25
  if (hours < 0.25) hours = 0.25;
  var rate = parseFloat(document.getElementById('timerRate').value) || 0;
  if (rate < 0) { alert('Hourly rate cannot be negative.'); return; }

  var entry = {
    id: uid(),
    date: new Date().toISOString().split('T')[0],
    client: document.getElementById('timerClient').value.trim() || 'Unspecified',
    category: document.getElementById('timerCategory').value,
    hours: hours,
    rate: rate,
    amount: Math.round(hours * rate * 100) / 100,
  };

  var entries = getEntries();
  entries.unshift(entry);
  localStorage.setItem(TT_KEY, JSON.stringify(entries));

  resetTimer();
  renderEntries();
  renderStats();
  alert('Saved: ' + hours + 'h = $' + entry.amount.toLocaleString());
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  updateTimerDisplay();
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStart').textContent = 'Start';
  document.getElementById('btnPause').style.display = 'none';
  document.getElementById('btnStop').style.display = 'none';
}

function updateTimerDisplay() {
  var h = Math.floor(timerSeconds / 3600);
  var m = Math.floor((timerSeconds % 3600) / 60);
  var s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function addManualEntry() {
  var hours = parseFloat(document.getElementById('meHours').value) || 0;
  var rate = parseFloat(document.getElementById('meRate').value) || 0;
  if (hours <= 0) { alert('Hours must be greater than zero.'); return; }
  if (rate < 0) { alert('Rate cannot be negative.'); return; }
  var entry = {
    id: uid(),
    date: document.getElementById('meDate').value || new Date().toISOString().split('T')[0],
    client: document.getElementById('meDesc').value.trim() || 'Manual entry',
    category: 'Admin / Other',
    hours: hours,
    rate: rate,
    amount: Math.round(hours * rate * 100) / 100,
  };
  var entries = getEntries();
  entries.unshift(entry);
  localStorage.setItem(TT_KEY, JSON.stringify(entries));
  document.getElementById('meDesc').value = '';
  renderEntries();
  renderStats();
}

function deleteEntry(idx) {
  if (!confirm('Delete this time entry?')) return;
  var entries = getEntries();
  entries.splice(idx, 1);
  localStorage.setItem(TT_KEY, JSON.stringify(entries));
  renderEntries();
  renderStats();
}

function createInvoiceFromEntry(idx) {
  var e = getEntries()[idx];
  if (!e) return;
  // Store as pending invoice item and redirect
  localStorage.setItem('rv_pending_invoice_item', JSON.stringify(e));
  window.location.href = 'invoice-builder.html';
}

/** Escape a CSV field — prevents CSV injection via =, +, -, @, \t, \r */
function csvSafe(val) {
  var s = String(val == null ? '' : val).replace(/"/g, '""');
  if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
  return '"' + s + '"';
}

function exportTimeEntries() {
  var entries = getEntries();
  var csv = 'Date,Client/Matter,Category,Hours,Rate,Amount\n';
  entries.forEach(function(e) {
    csv += csvSafe(e.date) + ',' + csvSafe(e.client) + ',' + csvSafe(e.category) + ',' + (e.hours||0) + ',' + (e.rate||0) + ',' + (e.amount||0) + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  var url = URL.createObjectURL(blob);
  a.href = url;
  a.download = 'rv_time_entries_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

// Init
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('meDate').value = new Date().toISOString().split('T')[0];
  renderStats();
  renderEntries();
});
</script>
</body>
</html>
