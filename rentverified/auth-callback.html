<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in... | 3120 Life</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
    }
    .card {
      text-align: center;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 380px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; color: #a5b4fc; }
    .error { color: #fca5a5; display: none; margin-top: 1rem; font-size: 0.85rem; }
    .error a { color: #818cf8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Signing you in...</h2>
    <p>Please wait while we verify your account.</p>
    <div class="error" id="errorMsg">
      Something went wrong. <a href="/landlord-signup.html">Return to login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function() {
      try {
        // Supabase auto-handles the OAuth redirect hash
        const session = await Auth.getSession();
        if (session) {
          const profile = await Auth.getProfile();
          const role = profile?.role || session.user?.user_metadata?.role || 'landlord';

          // Route user to the correct portal based on their role
          const routes = {
            admin:    '/admin.html',
            landlord: '/landlord-signup.html',
            tenant:   '/rentverified/tenant-portal.html',
            agent:    '/rentverified/agent-portal.html',
            vendor:   '/rentverified/vendor-portal.html'
          };

          window.location.href = routes[role] || '/landlord-signup.html';
        } else {
          throw new Error('No session found');
        }
      } catch (e) {
        console.error('OAuth callback error:', e);
        document.getElementById('errorMsg').style.display = 'block';
        document.querySelector('.spinner').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
